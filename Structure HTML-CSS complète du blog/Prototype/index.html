<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Blog</title>
    <style>
       
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            /* max-width: 700px; */
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
            color: #333;
            background-color: #fff;
        }

        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        nav a {
            margin-right: 15px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }

        nav a:hover { color: #000; }

        .post { margin-bottom: 40px; }

        .post h2 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: #111;
        }

        .post p { color: #555; }

        .post a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }

        footer {
            margin-top: 60px;
            font-size: 0.8rem;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mon Blog</h1>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Articles</a>
            <a href="#">À propos</a>
        </nav>
    </header>

    <main>
        <article class="post">
            <h2>Apprendre le Web</h2>
            <p>Un guide simple pour débuter avec HTML et CSS de manière efficace.</p>
            <a href="#">Lire l'article →</a>
        </article>

        <article class="post">
            <h2>Design Minimaliste</h2>
            <p>Pourquoi la simplicité est-elle la sophistication suprême en programmation ?</p>
            <a href="#">Lire l'article →</a>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 Tech Simple</p>
    </footer>

</body>
</html>
